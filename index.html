<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>スロット双六 - コインを集めろ！</title>
<style>
  :root{
    --blue:#1B6FF2;
    --blue-dark:#0A3D91;
    --blue-deeper:#062559;
    --yellow:#FFD23F;
    --yellow-dark:#F5A623;
    --white:#FFFFFF;
    --panel:#EAF4FF;
    --text:#0B2545;
    --green:#2ECC71;
    --red:#FF5252;
    --radius-lg:22px;
    --radius-md:14px;
    --radius-sm:8px;
    --glossy: inset 0 2px 3px rgba(255,255,255,.7), inset 0 -6px 10px rgba(0,0,0,.08), 0 6px 14px rgba(6,37,89,.25);
    --glossy-pressed: inset 0 3px 8px rgba(0,0,0,.25);
  }

  *{ box-sizing:border-box; -webkit-tap-highlight-color: transparent; }

  html,body{
    margin:0; padding:0; width:100%; height:100%;
    font-family: "Trebuchet MS","Hiragino Maru Gothic ProN","Helvetica Neue",Arial,sans-serif;
    color:var(--text);
    background:
      radial-gradient(circle at 15% 10%, rgba(255,255,255,.25) 0, transparent 40%),
      radial-gradient(circle at 85% 90%, rgba(255,255,255,.18) 0, transparent 45%),
      linear-gradient(160deg, var(--blue) 0%, var(--blue-dark) 55%, var(--blue-deeper) 100%);
    overflow-x:hidden;
    user-select:none;
  }

  #app{
    position:relative;
    min-height:100vh;
    display:flex;
    flex-direction:column;
    align-items:center;
    padding: 10px 10px 24px;
  }

  /* ===================== HUD ===================== */
  .hud{
    width:100%;
    max-width:900px;
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:8px;
    padding:8px 4px;
  }

  .hud-box{
    background: linear-gradient(180deg, #ffffff, #dff0ff);
    border-radius: var(--radius-md);
    box-shadow: var(--glossy);
    padding:8px 14px;
    display:flex;
    align-items:center;
    gap:8px;
    font-weight:800;
    white-space:nowrap;
  }

  .coin-icon{
    width:26px;height:26px;border-radius:50%;
    background: radial-gradient(circle at 35% 30%, #fff6cf, var(--yellow) 55%, var(--yellow-dark) 100%);
    box-shadow: 0 2px 3px rgba(0,0,0,.25), inset 0 0 0 2px rgba(255,255,255,.5);
    display:flex;align-items:center;justify-content:center;
    font-size:14px; color:#8a5a00; font-weight:900;
    flex:none;
  }
  .coin-icon::after{ content:"C"; }

  #coinValue{ font-size:20px; color:var(--blue-dark); }

  .score-box{
    text-align:center;
    background: linear-gradient(180deg, var(--yellow), var(--yellow-dark));
    border-radius: var(--radius-md);
    box-shadow: var(--glossy);
    padding:6px 18px;
    min-width:130px;
  }
  .score-label{ font-size:11px; letter-spacing:2px; color:#7a4b00; font-weight:800; }
  #scoreValue{
    font-size:24px; color:#5c3400; font-weight:900;
    transition: transform .18s ease;
  }
  #scoreValue.bump{ transform: scale(1.35); }

  #resetBtn{
    border:none; cursor:pointer;
    background: linear-gradient(180deg,#ffffff,#ffe9e9);
    color:#c62828;
    font-weight:800;
    padding:10px 16px;
    border-radius: var(--radius-md);
    box-shadow: var(--glossy);
    font-size:14px;
  }
  #resetBtn:active{ box-shadow: var(--glossy-pressed); transform: translateY(1px); }

  /* ===================== SLOT ===================== */
  .slot-wrap{
    margin-top:14px;
    width:100%;
    max-width:520px;
    background: linear-gradient(180deg, #ffffff 0%, var(--panel) 100%);
    border-radius: var(--radius-lg);
    box-shadow: var(--glossy);
    padding:18px 16px 20px;
    position:relative;
    border: 4px solid var(--yellow);
  }

  .slot-wrap::before{
    content:"";
    position:absolute; inset:-10px;
    border-radius: calc(var(--radius-lg) + 10px);
    background: repeating-conic-gradient(var(--yellow) 0 8deg, transparent 8deg 16deg);
    opacity:.55;
    z-index:-1;
    animation: bulbSpin 6s linear infinite;
  }
  @keyframes bulbSpin{ to{ transform: rotate(360deg); } }

  .reels{
    display:flex;
    justify-content:center;
    gap:10px;
    margin-bottom:14px;
  }

  .reel-unit{ display:flex; flex-direction:column; align-items:center; gap:8px; }

  .reel-window{
    width:78px; height:92px;
    background: linear-gradient(180deg, #0B2545, #16345f);
    border-radius: var(--radius-md);
    box-shadow: inset 0 4px 10px rgba(0,0,0,.6), 0 3px 0 rgba(255,255,255,.4);
    display:flex; align-items:center; justify-content:center;
    overflow:hidden;
    position:relative;
    border: 3px solid var(--blue-dark);
  }

  .reel-value{
    font-size:44px;
    font-weight:900;
    color:#fff;
    text-shadow: 0 2px 3px rgba(0,0,0,.4);
  }
  .reel-window.spinning .reel-value{
    filter: blur(2px);
  }
  .reel-window.landed .reel-value{
    animation: bounceLand .35s ease;
  }
  @keyframes bounceLand{
    0%{ transform: translateY(-14px) scale(.9); }
    55%{ transform: translateY(4px) scale(1.08); }
    100%{ transform: translateY(0) scale(1); }
  }
  .reel-window.glow{
    box-shadow: inset 0 4px 10px rgba(0,0,0,.6), 0 0 18px 6px rgba(255,210,63,.9);
  }

  .stop-btn{
    border:none; cursor:pointer;
    width:78px; padding:9px 0;
    font-weight:900; font-size:14px;
    color:#5c3400;
    background: linear-gradient(180deg,#fff6cf,var(--yellow));
    border-radius: var(--radius-sm);
    box-shadow: var(--glossy);
  }
  .stop-btn:disabled{ opacity:.4; cursor:default; }
  .stop-btn:active:not(:disabled){ box-shadow: var(--glossy-pressed); transform: translateY(2px) scale(.97); filter:brightness(.92); }

  .spin-row{ display:flex; justify-content:center; }
  #spinBtn{
    border:none; cursor:pointer;
    padding:14px 46px;
    font-size:19px; font-weight:900; letter-spacing:2px;
    color:#fff;
    background: linear-gradient(180deg, #3d8bff, var(--blue-dark));
    border-radius: 999px;
    box-shadow: var(--glossy);
  }
  #spinBtn:disabled{ opacity:.4; cursor:default; }
  #spinBtn:active:not(:disabled){ box-shadow: var(--glossy-pressed); transform: translateY(2px); }

  .cost-note{ text-align:center; font-size:12px; color:var(--blue-dark); margin-top:8px; font-weight:700; opacity:.8; }

  /* Judge banners */
  .judge-banner{
    position:absolute; left:50%; top:38%;
    transform: translate(-50%,-50%) scale(.5);
    font-size:40px; font-weight:900;
    opacity:0; pointer-events:none;
    text-shadow: 0 3px 0 rgba(0,0,0,.25);
    z-index:20;
  }
  .judge-banner.show-perfect{
    color: var(--yellow);
    animation: bannerPop .9s ease forwards;
  }
  .judge-banner.show-miss{
    color: #eee;
    animation: bannerPop .8s ease forwards;
  }
  @keyframes bannerPop{
    0%{ opacity:0; transform: translate(-50%,-50%) scale(.4) rotate(-6deg); }
    25%{ opacity:1; transform: translate(-50%,-50%) scale(1.15) rotate(2deg); }
    40%{ transform: translate(-50%,-50%) scale(1) rotate(0); }
    80%{ opacity:1; }
    100%{ opacity:0; transform: translate(-50%,-60%) scale(1); }
  }

  .flash-overlay{
    position:fixed; inset:0; background:#fff; opacity:0; pointer-events:none; z-index:60;
  }
  .flash-overlay.flash{ animation: flashAnim .35s ease; }
  @keyframes flashAnim{ 0%{opacity:.85;} 100%{opacity:0;} }

  .shake{ animation: shakeAnim .35s ease; }
  @keyframes shakeAnim{
    0%,100%{ transform: translateX(0); }
    20%{ transform: translateX(-8px); }
    40%{ transform: translateX(7px); }
    60%{ transform: translateX(-5px); }
    80%{ transform: translateX(3px); }
  }

  /* ===================== BOARD ===================== */
  .board-wrap{
    margin-top:18px;
    width:100%;
    max-width:900px;
    background: linear-gradient(180deg, #ffffff, var(--panel));
    border-radius: var(--radius-lg);
    box-shadow: var(--glossy);
    padding:16px 12px;
  }

  .board-title{
    text-align:center; font-weight:900; color:var(--blue-dark);
    letter-spacing:2px; margin-bottom:10px; font-size:14px;
  }

  .board{
    display:flex;
    flex-wrap:wrap;
    gap:8px;
    justify-content:center;
  }

  .tile{
    position:relative;
    width:70px; height:78px;
    border-radius: var(--radius-sm);
    background: linear-gradient(180deg,#ffffff,#dbe9fb);
    box-shadow: var(--glossy);
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    gap:2px;
    transition: box-shadow .25s ease, transform .2s ease;
  }
  .tile.bonus{
    background: linear-gradient(180deg,#fff6cf, var(--yellow));
  }
  .tile-num{ font-size:11px; font-weight:800; color:var(--blue-dark); opacity:.75; }
  .tile-reward{ font-size:15px; font-weight:900; color:#c65b00; }
  .tile.bonus .tile-reward{ color:#7a4b00; }

  .tile.current{
    transform: translateY(-4px) scale(1.06);
    box-shadow: 0 0 0 3px var(--blue), var(--glossy);
  }
  .tile.player-here::before{
    content:"●";
    position:absolute; top:-16px; left:50%; transform:translateX(-50%);
    color: var(--blue-dark);
    font-size: 20px;
    text-shadow: 0 2px 2px rgba(0,0,0,.3);
  }
  .tile.step-glow{
    animation: tileGlow .35s ease;
  }
  @keyframes tileGlow{
    0%{ box-shadow: 0 0 22px 8px rgba(255,210,63,1), var(--glossy); }
    100%{ box-shadow: var(--glossy); }
  }
  .tile.jump{
    animation: tileJump .3s ease;
  }
  @keyframes tileJump{
    0%,100%{ transform: translateY(0); }
    50%{ transform: translateY(-16px); }
  }

  /* Floating +coin / +score popups */
  .float-pop{
    position:fixed;
    font-weight:900; font-size:20px;
    color: var(--yellow-dark);
    text-shadow: 0 2px 0 rgba(0,0,0,.35), 0 0 6px rgba(255,255,255,.6);
    pointer-events:none;
    z-index:70;
    animation: floatUp 1s ease forwards;
  }
  @keyframes floatUp{
    0%{ opacity:0; transform: translateY(0) scale(.7); }
    15%{ opacity:1; transform: translateY(-8px) scale(1.1); }
    100%{ opacity:0; transform: translateY(-60px) scale(1); }
  }

  .coin-fly{
    position:fixed; width:22px; height:22px; border-radius:50%;
    background: radial-gradient(circle at 35% 30%, #fff6cf, var(--yellow) 55%, var(--yellow-dark) 100%);
    box-shadow: 0 2px 4px rgba(0,0,0,.3);
    z-index:70;
    pointer-events:none;
  }

  /* Confetti */
  .confetti-piece{
    position:fixed; width:8px; height:14px; z-index:65; pointer-events:none;
    animation: confettiFall 1.1s linear forwards;
    border-radius:2px;
  }
  @keyframes confettiFall{
    0%{ transform: translateY(0) rotate(0deg); opacity:1; }
    100%{ transform: translateY(320px) rotate(540deg); opacity:0; }
  }

  /* Bonus banner */
  .bonus-banner{
    position:fixed; left:50%; top:35%; transform:translate(-50%,-50%) scale(.5);
    font-size:34px; font-weight:900; letter-spacing:1px;
    background: linear-gradient(90deg,#ff5fa2,#ffd23f,#5fd0ff,#8bff5f,#ff5fa2);
    background-size:300% 100%;
    -webkit-background-clip:text; background-clip:text; color:transparent;
    z-index:75; opacity:0; pointer-events:none;
    animation: bonusPop 1.4s ease forwards, bonusShift 1.4s linear forwards;
    text-shadow: none;
  }
  @keyframes bonusPop{
    0%{ opacity:0; transform: translate(-50%,-50%) scale(.3); }
    20%{ opacity:1; transform: translate(-50%,-50%) scale(1.2); }
    35%{ transform: translate(-50%,-50%) scale(1); }
    85%{ opacity:1; }
    100%{ opacity:0; transform: translate(-50%,-65%) scale(1.05); }
  }
  @keyframes bonusShift{ from{ background-position:0% 0; } to{ background-position:300% 0; } }

  .zoom-pulse{ animation: zoomPulse .6s ease; }
  @keyframes zoomPulse{
    0%,100%{ transform: scale(1); }
    50%{ transform: scale(1.03); }
  }

  /* ===================== GAME OVER ===================== */
  .gameover-overlay{
    position:fixed; inset:0; background: rgba(4,12,30,.82);
    display:flex; align-items:center; justify-content:center;
    z-index:80; opacity:0; pointer-events:none; transition: opacity .4s ease;
  }
  .gameover-overlay.active{ opacity:1; pointer-events:all; }
  .gameover-box{ text-align:center; }
  .gameover-title{
    font-size:52px; font-weight:900; color:#ff5252;
    letter-spacing:4px;
    text-shadow: 0 0 20px rgba(255,82,82,.7);
    margin-bottom:10px;
  }
  .gameover-sub{ color:#fff; font-weight:700; opacity:.85; margin-bottom:18px; }

  /* Responsive */
  @media (max-width: 480px){
    .reel-window{ width:62px; height:76px; }
    .reel-value{ font-size:34px; }
    .stop-btn{ width:62px; font-size:12px; padding:7px 0; }
    #spinBtn{ padding:12px 32px; font-size:16px; }
    .tile{ width:56px; height:64px; }
    .tile-reward{ font-size:12px; }
    .hud-box{ padding:6px 10px; }
    #coinValue{ font-size:16px; }
    .score-box{ min-width:100px; padding:5px 10px; }
    #scoreValue{ font-size:19px; }
    .gameover-title{ font-size:38px; }
  }
</style>
</head>
<body>
<div id="app">

  <div class="hud">
    <div class="hud-box"><span class="coin-icon"></span><span id="coinValue">100</span></div>
    <div class="score-box">
      <div class="score-label">SCORE</div>
      <div id="scoreValue">0</div>
    </div>
    <button id="resetBtn">↺ Reset</button>
  </div>

  <div class="slot-wrap" id="slotWrap">
    <div class="judge-banner" id="judgeBanner"></div>
    <div class="reels">
      <div class="reel-unit">
        <div class="reel-window" id="reelWindow0"><div class="reel-value" id="reelValue0">1</div></div>
        <button class="stop-btn" id="stopBtn0" disabled>STOP</button>
      </div>
      <div class="reel-unit">
        <div class="reel-window" id="reelWindow1"><div class="reel-value" id="reelValue1">1</div></div>
        <button class="stop-btn" id="stopBtn1" disabled>STOP</button>
      </div>
      <div class="reel-unit">
        <div class="reel-window" id="reelWindow2"><div class="reel-value" id="reelValue2">1</div></div>
        <button class="stop-btn" id="stopBtn2" disabled>STOP</button>
      </div>
    </div>
    <div class="spin-row">
      <button id="spinBtn">SPIN ▶</button>
    </div>
    <div class="cost-note">1回 5コイン消費 / 3つ揃うとその数だけ進める</div>
  </div>

  <div class="board-wrap">
    <div class="board-title">SUGOROKU BOARD (全10マス・ループ)</div>
    <div class="board" id="board"></div>
  </div>

  <div class="gameover-overlay" id="gameoverOverlay">
    <div class="gameover-box">
      <div class="gameover-title">GAME OVER</div>
      <div class="gameover-sub">コインが尽きました。リセットして再挑戦しよう！</div>
      <button id="resetBtnGO" style="border:none;cursor:pointer;background:linear-gradient(180deg,#fff6cf,var(--yellow));color:#5c3400;font-weight:900;padding:12px 30px;border-radius:999px;box-shadow:var(--glossy);font-size:15px;">↺ もう一度あそぶ</button>
    </div>
  </div>

</div>

<div class="flash-overlay" id="flashOverlay"></div>

<script>
(function(){
  "use strict";

  /* =========================================================
     CONFIG — 拡張したい場合はここを編集するだけでOK
  ========================================================= */
  const CONFIG = {
    initialCoins: 100,
    spinCost: 5,
    minCoinsToPlay: 5,
    boardSize: 10,
    reelSymbols: [1,2,3,4,5,6],
    tileRewardPool: [5,10,15,20,25,30],
    bonusTile: 10,
    bonusAmount: 100,
    stepAnimDelay: 260,     // 双六1マス移動の待ち時間(ms)
    spinCycleInterval: 70,  // 高速回転の切り替え間隔(ms)
    decelSteps: 6,          // 停止前の減速コマ数
  };

  /* =========================================================
     STATE
  ========================================================= */
  const state = {
    coins: 0,
    score: 0,
    position: 1,
    gameOver: false,
    tileRewards: {},   // {1: 10, ... 9: x, 10: 100}
    reels: [
      { value: 1, spinning: false, stopped: true, intervalId: null },
      { value: 1, spinning: false, stopped: true, intervalId: null },
      { value: 1, spinning: false, stopped: true, intervalId: null },
    ],
    resolving: false,
  };

  /* =========================================================
     DOM refs
  ========================================================= */
  const el = {
    coinValue: document.getElementById('coinValue'),
    scoreValue: document.getElementById('scoreValue'),
    resetBtn: document.getElementById('resetBtn'),
    resetBtnGO: document.getElementById('resetBtnGO'),
    spinBtn: document.getElementById('spinBtn'),
    board: document.getElementById('board'),
    slotWrap: document.getElementById('slotWrap'),
    judgeBanner: document.getElementById('judgeBanner'),
    flashOverlay: document.getElementById('flashOverlay'),
    gameoverOverlay: document.getElementById('gameoverOverlay'),
    reelWindows: [0,1,2].map(i => document.getElementById('reelWindow'+i)),
    reelValues: [0,1,2].map(i => document.getElementById('reelValue'+i)),
    stopBtns: [0,1,2].map(i => document.getElementById('stopBtn'+i)),
  };

  /* =========================================================
     SOUND — WebAudio による簡易効果音（外部素材不使用）
  ========================================================= */
  const Sound = (function(){
    let ctx = null;
    function getCtx(){
      if(!ctx){
        const AC = window.AudioContext || window.webkitAudioContext;
        ctx = new AC();
      }
      if(ctx.state === 'suspended') ctx.resume();
      return ctx;
    }
    function tone(freq, dur, type, vol, delay){
      try{
        const c = getCtx();
        const t0 = c.currentTime + (delay||0);
        const osc = c.createOscillator();
        const gain = c.createGain();
        osc.type = type || 'square';
        osc.frequency.setValueAtTime(freq, t0);
        gain.gain.setValueAtTime(0, t0);
        gain.gain.linearRampToValueAtTime(vol||0.15, t0+0.01);
        gain.gain.exponentialRampToValueAtTime(0.001, t0+dur);
        osc.connect(gain).connect(c.destination);
        osc.start(t0);
        osc.stop(t0+dur+0.02);
      }catch(e){ /* audio not available */ }
    }
    return {
      click(){ tone(520,0.06,'square',0.12); },
      spinTick(){ tone(300+Math.random()*120,0.03,'square',0.05); },
      stop(){ tone(220,0.12,'triangle',0.18); tone(440,0.1,'triangle',0.1,0.05); },
      coin(){ tone(880,0.08,'sine',0.15); tone(1180,0.12,'sine',0.15,0.06); },
      perfect(){ [660,880,1100,1320].forEach((f,i)=>tone(f,0.16,'triangle',0.16,i*0.08)); },
      miss(){ tone(160,0.25,'sawtooth',0.15); },
      bonus(){ [523,659,784,1046,1318].forEach((f,i)=>tone(f,0.22,'triangle',0.18,i*0.09)); },
      gameover(){ [420,360,300,220].forEach((f,i)=>tone(f,0.3,'sawtooth',0.15,i*0.18)); },
    };
  })();

  /* =========================================================
     TILE REWARDS — 1〜9はランダム, 10は固定ボーナス
  ========================================================= */
  function randomFrom(arr){ return arr[Math.floor(Math.random()*arr.length)]; }

  function generateTileRewards(){
    const rewards = {};
    for(let i=1;i<CONFIG.boardSize;i++){
      rewards[i] = randomFrom(CONFIG.tileRewardPool);
    }
    rewards[CONFIG.boardSize] = CONFIG.bonusAmount;
    return rewards;
  }

  /* =========================================================
     UI — HUD
  ========================================================= */
  function renderCoins(){ el.coinValue.textContent = state.coins; }
  function renderScore(bump){
    el.scoreValue.textContent = state.score;
    if(bump){
      el.scoreValue.classList.remove('bump');
      void el.scoreValue.offsetWidth;
      el.scoreValue.classList.add('bump');
    }
  }

  /* =========================================================
     UI — BOARD
  ========================================================= */
  function renderBoard(){
    el.board.innerHTML = '';
    for(let i=1;i<=CONFIG.boardSize;i++){
      const tile = document.createElement('div');
      tile.className = 'tile' + (i===CONFIG.boardSize ? ' bonus':'');
      tile.id = 'tile-'+i;
      if(i === state.position){
        tile.classList.add('current','player-here');
      }
      const num = document.createElement('div');
      num.className = 'tile-num';
      num.textContent = i + 'マス';
      const reward = document.createElement('div');
      reward.className = 'tile-reward';
      reward.textContent = '+' + state.tileRewards[i];
      tile.appendChild(num);
      tile.appendChild(reward);
      el.board.appendChild(tile);
    }
  }

  function setCurrentTile(pos){
    document.querySelectorAll('.tile.current').forEach(t=>t.classList.remove('current','player-here'));
    const tile = document.getElementById('tile-'+pos);
    if(tile) tile.classList.add('current','player-here');
    return tile;
  }

  /* =========================================================
     FX helpers — popups / coin fly / confetti
  ========================================================= */
  function showFloatPop(text, x, y, color){
    const p = document.createElement('div');
    p.className = 'float-pop';
    p.textContent = text;
    p.style.left = x + 'px';
    p.style.top = y + 'px';
    if(color) p.style.color = color;
    document.body.appendChild(p);
    setTimeout(()=>p.remove(), 1050);
  }

  function flyCoinToHud(fromEl){
    const hudCoin = document.querySelector('.coin-icon').getBoundingClientRect();
    const fromRect = fromEl.getBoundingClientRect();
    const count = 5;
    for(let i=0;i<count;i++){
      setTimeout(()=>{
        const c = document.createElement('div');
        c.className = 'coin-fly';
        const startX = fromRect.left + fromRect.width/2 + (Math.random()*20-10);
        const startY = fromRect.top + fromRect.height/2;
        c.style.left = startX + 'px';
        c.style.top = startY + 'px';
        document.body.appendChild(c);
        const endX = hudCoin.left + hudCoin.width/2;
        const endY = hudCoin.top + hudCoin.height/2;
        const anim = c.animate([
          { transform:'translate(0,0) scale(1)', opacity:1 },
          { transform:`translate(${endX-startX}px, ${endY-startY}px) scale(.4)`, opacity:.9 }
        ], { duration: 520, easing:'cubic-bezier(.3,.6,.4,1)' });
        anim.onfinish = ()=> c.remove();
      }, i*40);
    }
  }

  function spawnConfetti(originX, originY, count, colors){
    colors = colors || ['#FFD23F','#1B6FF2','#FF5FA2','#8BFF5F','#5FD0FF'];
    for(let i=0;i<count;i++){
      const p = document.createElement('div');
      p.className = 'confetti-piece';
      p.style.left = (originX + (Math.random()*160-80)) + 'px';
      p.style.top = (originY - 20) + 'px';
      p.style.background = colors[Math.floor(Math.random()*colors.length)];
      p.style.animationDelay = (Math.random()*0.15)+'s';
      p.style.transform = `rotate(${Math.random()*360}deg)`;
      document.body.appendChild(p);
      setTimeout(()=>p.remove(), 1300);
    }
  }

  function flashScreen(){
    el.flashOverlay.classList.remove('flash');
    void el.flashOverlay.offsetWidth;
    el.flashOverlay.classList.add('flash');
  }

  function showJudgeBanner(text, kind){
    el.judgeBanner.textContent = text;
    el.judgeBanner.className = 'judge-banner ' + (kind==='perfect' ? 'show-perfect':'show-miss');
    void el.judgeBanner.offsetWidth;
    el.judgeBanner.classList.add(kind==='perfect' ? 'show-perfect':'show-miss');
    setTimeout(()=>{ el.judgeBanner.className = 'judge-banner'; }, 900);
  }

  function showBonusBanner(){
    const b = document.createElement('div');
    b.className = 'bonus-banner';
    b.textContent = 'BONUS +' + CONFIG.bonusAmount + '!!';
    document.body.appendChild(b);
    setTimeout(()=>b.remove(), 1450);
    document.getElementById('app').classList.add('zoom-pulse');
    setTimeout(()=>document.getElementById('app').classList.remove('zoom-pulse'), 650);
  }

  /* =========================================================
     SLOT LOGIC
  ========================================================= */
  function setSpinButtonEnabled(enabled){
    el.spinBtn.disabled = !enabled;
  }

  function startSpin(){
    if(state.gameOver || state.resolving) return;
    if(state.coins < CONFIG.spinCost) return;

    Sound.click();

    state.coins -= CONFIG.spinCost;
    renderCoins();

    setSpinButtonEnabled(false);
    el.judgeBanner.className = 'judge-banner';

    state.reels.forEach((reel, idx)=>{
      reel.spinning = true;
      reel.stopped = false;
      el.reelWindows[idx].classList.remove('landed','glow');
      el.reelWindows[idx].classList.add('spinning');
      el.stopBtns[idx].disabled = false;

      reel.intervalId = setInterval(()=>{
        reel.value = randomFrom(CONFIG.reelSymbols);
        el.reelValues[idx].textContent = reel.value;
        Sound.spinTick();
      }, CONFIG.spinCycleInterval);
    });
  }

  function stopReel(idx){
    const reel = state.reels[idx];
    if(!reel.spinning || reel.stopped) return;

    clearInterval(reel.intervalId);
    reel.spinning = false;
    el.stopBtns[idx].disabled = true;

    // 減速演出：数コマゆっくり切り替えてから確定
    let count = 0;
    const decel = setInterval(()=>{
      reel.value = randomFrom(CONFIG.reelSymbols);
      el.reelValues[idx].textContent = reel.value;
      count++;
      if(count >= CONFIG.decelSteps){
        clearInterval(decel);
        finalizeReel(idx);
      }
    }, 60 + count*10);
  }

  function finalizeReel(idx){
    const reel = state.reels[idx];
    reel.value = randomFrom(CONFIG.reelSymbols);
    el.reelValues[idx].textContent = reel.value;
    reel.stopped = true;

    el.reelWindows[idx].classList.remove('spinning');
    el.reelWindows[idx].classList.add('landed');
    Sound.stop();

    if(state.reels.every(r=>r.stopped)){
      state.resolving = true;
      setTimeout(resolveSpin, 250);
    }
  }

  function resolveSpin(){
    const values = state.reels.map(r=>r.value);
    const allSame = values[0]===values[1] && values[1]===values[2];

    if(allSame){
      const steps = values[0];
      Sound.perfect();
      flashScreen();
      state.reels.forEach((_,i)=>el.reelWindows[i].classList.add('glow'));
      showJudgeBanner('PERFECT!!','perfect');
      const rect = el.slotWrap.getBoundingClientRect();
      spawnConfetti(rect.left+rect.width/2, rect.top+40, 26);

      setTimeout(()=>{
        state.reels.forEach((_,i)=>el.reelWindows[i].classList.remove('glow'));
        movePlayer(steps, ()=>{
          finishTurn();
        });
      }, 500);
    } else {
      Sound.miss();
      showJudgeBanner('MISS','miss');
      el.slotWrap.classList.remove('shake');
      void el.slotWrap.offsetWidth;
      el.slotWrap.classList.add('shake');
      setTimeout(()=>{
        finishTurn();
      }, 500);
    }
  }

  function finishTurn(){
    state.resolving = false;
    if(state.coins < CONFIG.minCoinsToPlay){
      triggerGameOver();
    } else {
      setSpinButtonEnabled(true);
    }
  }

  /* =========================================================
     BOARD MOVEMENT
  ========================================================= */
  function movePlayer(steps, onComplete){
    let remaining = steps;

    function stepOnce(){
      if(remaining <= 0){
        onTileArrive();
        if(onComplete) onComplete();
        return;
      }
      state.position = ((state.position - 1 + 1) % CONFIG.boardSize) + 1;
      const tile = setCurrentTile(state.position);
      if(tile){
        tile.classList.add('jump');
        setTimeout(()=>tile.classList.remove('jump'), 300);
      }
      remaining--;
      setTimeout(stepOnce, CONFIG.stepAnimDelay);
    }
    stepOnce();
  }

  function onTileArrive(){
    const pos = state.position;
    const reward = state.tileRewards[pos];
    const tile = document.getElementById('tile-'+pos);

    if(tile){
      tile.classList.add('step-glow');
      setTimeout(()=>tile.classList.remove('step-glow'), 400);
    }

    state.coins += reward;
    state.score += reward;

    if(tile){
      const r = tile.getBoundingClientRect();
      showFloatPop('+'+reward, r.left + r.width/2 - 14, r.top - 6);
      flyCoinToHud(tile);
    }
    Sound.coin();
    renderCoins();
    renderScore(true);

    if(pos === CONFIG.bonusTile){
      Sound.bonus();
      showBonusBanner();
      if(tile){
        const r = tile.getBoundingClientRect();
        spawnConfetti(r.left+r.width/2, r.top, 40, ['#FFD23F','#FF5FA2','#8BFF5F','#5FD0FF','#FFFFFF']);
      }
    }
  }

  /* =========================================================
     GAME OVER
  ========================================================= */
  function triggerGameOver(){
    state.gameOver = true;
    Sound.gameover();
    el.gameoverOverlay.classList.add('active');
    setSpinButtonEnabled(false);
    el.stopBtns.forEach(b=>b.disabled = true);
  }

  /* =========================================================
     RESET
  ========================================================= */
  function resetGame(){
    const ok = window.confirm('ゲームをリセットしますか？');
    if(!ok) return;

    state.coins = CONFIG.initialCoins;
    state.score = 0;
    state.position = 1;
    state.gameOver = false;
    state.resolving = false;
    state.tileRewards = generateTileRewards();
    state.reels.forEach(r=>{
      clearInterval(r.intervalId);
      r.value = 1; r.spinning=false; r.stopped=true;
    });

    el.reelValues.forEach((v,i)=>{ v.textContent = '1'; });
    el.reelWindows.forEach(w=>w.classList.remove('spinning','landed','glow'));
    el.stopBtns.forEach(b=>b.disabled = true);
    el.judgeBanner.className = 'judge-banner';
    el.gameoverOverlay.classList.remove('active');

    renderCoins();
    renderScore(false);
    renderBoard();
    setSpinButtonEnabled(true);
    Sound.click();
  }

  /* =========================================================
     EVENTS
  ========================================================= */
  el.spinBtn.addEventListener('click', startSpin);
  el.stopBtns.forEach((btn, idx)=> btn.addEventListener('click', ()=>{ Sound.click(); stopReel(idx); }));
  el.resetBtn.addEventListener('click', resetGame);
  el.resetBtnGO.addEventListener('click', resetGame);

  /* =========================================================
     INIT
  ========================================================= */
  function init(){
    state.coins = CONFIG.initialCoins;
    state.score = 0;
    state.position = 1;
    state.tileRewards = generateTileRewards();
    renderCoins();
    renderScore(false);
    renderBoard();
    setSpinButtonEnabled(true);
  }

  init();
})();
</script>
</body>
</html>
