<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>スロット双六 - コインを集めろ！</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<div id="app">

  <div class="best-score-bar" id="bestScoreBar">
    <span class="best-score-label">BEST SCORE</span>
    <span class="best-score-empty">読み込み中...</span>
  </div>

  <div class="hud">
    <div class="hud-box"><span class="coin-icon"></span><span id="coinValue">100</span></div>
    <div class="score-box">
      <div class="score-label">SCORE</div>
      <div id="scoreValue">0</div>
    </div>
    <div class="hud-actions">
      <button id="profileBtn">👤 プロフィール</button>
      <button id="rankingBtn">🏆 ランキング</button>
      <button id="resetBtn">↺ Reset</button>
    </div>
  </div>

  <div class="lucky-meter-wrap">
    <div class="lucky-meter-label" id="luckyMeterLabel">LUCKY METER 0/10</div>
    <div class="lucky-meter-track"><div class="lucky-meter-fill" id="luckyMeterFill"></div></div>
  </div>

  <div class="slot-wrap" id="slotWrap">
    <div class="judge-banner" id="judgeBanner"></div>
    <div class="reels">
      <div class="reel-unit">
        <div class="reel-window" id="reelWindow0"><div class="reel-value" id="reelValue0">1</div></div>
        <button class="stop-btn" id="stopBtn0" disabled>STOP</button>
      </div>
      <div class="reel-unit">
        <div class="reel-window" id="reelWindow1"><div class="reel-value" id="reelValue1">1</div></div>
        <button class="stop-btn" id="stopBtn1" disabled>STOP</button>
      </div>
      <div class="reel-unit">
        <div class="reel-window" id="reelWindow2"><div class="reel-value" id="reelValue2">1</div></div>
        <button class="stop-btn" id="stopBtn2" disabled>STOP</button>
      </div>
    </div>
    <div class="spin-row">
      <button id="spinBtn">SPIN ▶</button>
    </div>
    <div class="cost-note">1回 5コイン消費 / 3つ揃うとその数だけ進める</div>
  </div>

  <div class="board-wrap">
    <div class="board-title">SUGOROKU BOARD (全10マス・ループ)</div>
    <div class="board" id="board"></div>
  </div>

  <div class="gameover-overlay" id="gameoverOverlay">
    <div class="gameover-box">
      <div class="gameover-title">GAME OVER</div>
      <div class="gameover-sub">コインが尽きました。リセットして再挑戦しよう！</div>
      <button id="resetBtnGO" style="border:none;cursor:pointer;background:linear-gradient(180deg,#fff6cf,var(--yellow));color:#5c3400;font-weight:900;padding:12px 30px;border-radius:999px;box-shadow:var(--glossy);font-size:15px;">↺ もう一度あそぶ</button>
    </div>
  </div>

</div>

<div class="flash-overlay" id="flashOverlay"></div>

<!-- ===================== プロフィールモーダル ===================== -->
<div class="modal-overlay" id="profileModal">
  <div class="modal-box">
    <div class="modal-header">
      <h2>👤 プロフィール</h2>
      <button class="modal-close-btn" id="profileCloseBtn">✕</button>
    </div>
    <div class="field-group">
      <label>ユーザーネーム（12文字以内）</label>
      <input type="text" id="profileNameInput" maxlength="12" placeholder="プレイヤー名">
    </div>
    <div class="field-group">
      <label>称号</label>
      <div class="title-list" id="profileTitleList"></div>
    </div>
    <div class="field-group">
      <label>実績</label>
      <ul class="achievement-list" id="profileAchievementList"></ul>
    </div>
    <div class="field-group">
      <button id="profileAikotobaBtn" style="border:none;cursor:pointer;width:100%;background:linear-gradient(180deg,#eafff0,#c9ffd9);color:#146c2e;font-weight:800;padding:11px;border-radius:14px;box-shadow:var(--glossy);font-size:13px;">🔑 あいことばを入力</button>
    </div>
    <button class="primary-btn" id="profileSaveBtn">保存する</button>
  </div>
</div>

<!-- ===================== ランキングモーダル ===================== -->
<div class="modal-overlay" id="rankingModal">
  <div class="modal-box">
    <div class="modal-header">
      <h2>🏆 ランキング</h2>
      <button class="modal-close-btn" id="rankingCloseBtn">✕</button>
    </div>
    <div class="ranking-list" id="rankingList"></div>
  </div>
</div>

<!-- ===================== あいことばモーダル ===================== -->
<div class="modal-overlay" id="aikotobaModal">
  <div class="modal-box">
    <div class="modal-header">
      <h2>🔑 あいことば入力</h2>
      <button class="modal-close-btn" id="aikotobaCloseBtn">✕</button>
    </div>
    <div class="field-group">
      <label>あいことば</label>
      <input type="text" id="aikotobaInput" placeholder="あいことばを入力">
      <div class="field-hint">同じあいことばは1人1回のみ使用できます</div>
    </div>
    <button class="primary-btn" id="aikotobaSubmitBtn">送信する</button>
  </div>
</div>

<script type="module" src="js/main.js"></script>
</body>
</html>
